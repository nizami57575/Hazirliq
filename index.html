<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zirvə Təhsil Portalı</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="bg-animation"><div class="circle"></div><div class="circle"></div></div>

    <div id="entry-screen" class="overlay">
        <div class="glass-card entry-card">
            <h1 id="greeting-msg">Xoş Gəldiniz!</h1>
            <p>Zirvə Təhsil Portalı - Gələcəyini İndi Qur.</p>
            <button class="btn btn-primary" onclick="showBot('registration')">📝 Qeydiyyat</button>
            <button class="btn btn-outline" onclick="openSite()">🚀 Sayta Keç</button>
        </div>
    </div>

    <div id="bot-modal" class="modal">
        <div class="glass-card bot-container">
            <div class="bot-header">
                <span><i class="fas fa-robot"></i> Zirvə Bot</span>
                <button onclick="closeModal()" class="close-btn">&times;</button>
            </div>
            <div id="bot-content" class="bot-body">
                <p id="bot-msg"></p>
                <div id="bot-input-group">
                    <input type="text" id="user-name-input" placeholder="Adınızı yazın...">
                    <button onclick="startConversing()" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div id="bot-choices" class="choice-list"></div>
            </div>
        </div>
    </div>

    <div id="main-content" style="display:none; padding-top: 50px;">
        <nav class="container nav-bar">
            <div class="logo">ZİRVƏ</div>
            <div class="nav-links">
                <button onclick="showBot('support')"><i class="fas fa-headset"></i></button>
                <button onclick="shareSite()"><i class="fas fa-share-alt"></i></button>
            </div>
        </nav>

        <main class="container">
            <div class="leader-banner glass-card">
                <span>🏆 Həftənin Qalibi:</span> <strong>Nizami Cəfərli</strong>
            </div>

            <section id="quiz-area" class="glass-card">
                <div class="quiz-header">
                    <h2 id="quiz-month-title">Yüklənir...</h2>
                    <div id="timer" class="timer-circle">30</div>
                </div>
                <div id="quiz-display">
                    <p>Sınaq yüklənir...</p>
                </div>
            </section>
        </main>
        
        <footer>
            <p>Əlaqə: +994 51 772 88 24</p>
        </footer>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
</body>
</html>
